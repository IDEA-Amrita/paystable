name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: paystable
          POSTGRES_PASSWORD: paystable
          POSTGRES_DB: paystable_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U paystable"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://paystable:paystable@localhost:5432/paystable_test?sslmode=disable
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run lint
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build -o paystable ./cmd/paystable
      - run: docker build -t paystable:ci .
